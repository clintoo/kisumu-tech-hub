name: One-Time History Merge (run once, then delete this workflow)

on:
  workflow_dispatch: {}   # manual trigger only — this should run exactly once

jobs:
  merge-once:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository (destination)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user profile
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Add source remote and fetch
        run: |
          # Add a token here if the source repo is private:
          # https://x-access-token:${{ secrets.SOURCE_READ_TOKEN }}@github.com/https://kc-clintone/z01k-events.git
          git remote add source https://github.com/kc-clintone/z01k-events.git
          git fetch source main

      - name: Merge source history into main (one time only)
        run: |
          git merge source/main --allow-unrelated-histories -m "Merge history from source repo (one-time sync)"
          # If this fails with conflicts, resolve them locally instead —
          # see the note below the workflow.

      - name: Push merged history
        run: |
          git push origin main
