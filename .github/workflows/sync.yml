name: Pull from Open-Source Repo

on:
  schedule:
    - cron: "*/55 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository (destination)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user profile
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Add source remote and fetch
        run: |
          git remote add source https://github.com/kc-clintone/z01k-events.git
          git fetch source main

      - name: Mirror source into destination branch
        run: |
          git checkout main
          git reset --hard source/main

      - name: Push updates to this repo
        run: |
          git push origin main --force-with-lease
